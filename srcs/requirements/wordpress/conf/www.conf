[www]

; The user and group that the
; PHP-FPM process will run as
user = www-data
group = www-data


; Listens on port 9000
listen = 0.0.0.0:9000


; A dynamic number of processes gets created based
; on the number of incoming requests
pm = dynamic
pm.start_servers = 1
pm.max_children = 5
pm.min_spare_servers = 1
pm.max_spare_servers = 2